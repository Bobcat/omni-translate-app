<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0e1117" media="(prefers-color-scheme: dark)">
    <title>ASR Translate TTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/styles.css?v=20260514-voxcpm-options-5">
  </head>
  <body>
    <main class="app is-setup">
      <header class="app-titlebar">
        <h1 class="app-title"><strong>Another</strong> Translate</h1>
        <button class="settings-button titlebar-settings-button" id="settingsButton" type="button" aria-label="Open settings" title="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </header>
      <section class="text-panels" aria-live="polite">
        <div class="turn-header-actions" id="turnHeaderActions" hidden>
          <button class="icon-action clear-turn-action" id="clearTurnButton" type="button" aria-label="Clear turn" title="Clear turn" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"/>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
              <line x1="10" x2="10" y1="11" y2="17"/>
              <line x1="14" x2="14" y1="11" y2="17"/>
            </svg>
          </button>
          <button class="icon-action switch-turn-action" id="swapButton" type="button" aria-label="Switch turn" title="Switch turn">
            <span class="turn-language-label" id="turnSourceLanguage">NL</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3 4 7l4 4"/>
              <path d="M4 7h16"/>
              <path d="m16 21 4-4-4-4"/>
              <path d="M20 17H4"/>
            </svg>
            <span class="turn-language-label" id="turnTargetLanguage">EN</span>
          </button>
        </div>
        <article class="pane source-pane">
          <div class="pane-header">
            <h1>What is heard</h1>
            <div class="pane-indicators">
              <span class="vad-badge" id="vadBadge" hidden>Speech detected</span>
            </div>
            <span class="session-status-pill" id="sessionStatusPill" hidden>Mic off</span>
          </div>
          <div class="pane-body">
            <div class="setup-start-panel" id="setupStartPanel">
              <button class="setup-start-button" id="startButton" type="button" title="Start" aria-label="Start">
                <svg class="setup-start-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="22"></line>
                </svg>
              </button>
            </div>
            <div class="text-stream" id="sourceText" data-empty="No speech recognized yet"></div>
          </div>
        </article>
        <article class="pane target-pane">
          <div class="pane-header">
            <h1>Translation</h1>
            </div>
          <div class="text-stream" id="targetText" data-empty="No translation yet"></div>
        </article>
      </section>

      <footer class="action-dock">
        <div class="dock-center">
          <button class="language-pill" id="sourceLanguagePill" type="button" aria-label="Choose source language">
            <span class="language-pill-text"></span>
          </button>
          <button class="setup-switch-action" id="setupSwapButton" type="button" aria-label="Switch selected languages" title="Switch selected languages" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3 4 7l4 4"/>
              <path d="M4 7h16"/>
              <path d="m16 21 4-4-4-4"/>
              <path d="M20 17H4"/>
            </svg>
          </button>
          <button class="language-pill" id="targetLanguagePill" type="button" aria-label="Choose target language">
            <span class="language-pill-text"></span>
          </button>
          <button class="dock-action round-action pc-export-action" id="pcExportButton" type="button" aria-label="Export PC transcript" title="Export PC" disabled hidden>
            <span class="round-action-label">PC</span>
          </button>
          <button class="dock-action round-action translate-action" id="translateNowButton" type="button" aria-label="Translate now" title="Translate now" disabled hidden>
            <svg class="round-action-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 8 6 6"/>
              <path d="m4 14 6-6 2-3"/>
              <path d="M2 5h12"/>
              <path d="M7 2h1"/>
              <path d="m22 22-5-10-5 10"/>
              <path d="M14 18h6"/>
            </svg>
          </button>
          <button class="dock-action round-action mic-toggle-action is-mic-listening-action" id="micToggleButton" type="button" aria-label="Turn microphone off" title="Mic off" disabled hidden>
            <svg class="round-action-icon mic-toggle-icon mic-toggle-off-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" stroke="none"></rect>
            </svg>
            <svg class="round-action-icon mic-toggle-icon mic-toggle-on-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
          </button>
          <button class="dock-action round-action speak-action" id="speakNowButton" type="button" aria-label="Speak now" title="Speak now" disabled hidden>
            <svg class="round-action-icon" viewBox="0 0 24 24" aria-hidden="true">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </button>
        </div>
        <div class="dock-end">
          <button class="dock-action round-action finish-action" id="finishButton" type="button" aria-label="Finish session" title="Finish" hidden>
            <svg class="round-action-icon finish-action-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="8" y="8" width="8" height="8" rx="1.6"></rect>
            </svg>
          </button>
        </div>
      </footer>
      <button class="hidden-playback-button" id="audioResumeButton" type="button" hidden>Play audio</button>
      <audio id="ttsAudio" preload="auto"></audio>

      <div class="sheet-layer" id="settingsSheet" hidden>
        <button class="sheet-scrim" id="settingsSheetScrim" type="button" aria-label="Close"></button>
        <section class="bottom-sheet" role="dialog" aria-modal="true" aria-labelledby="settingsSheetTitle">
          <header class="sheet-header">
            <button class="settings-back is-sheet-close" id="settingsBackButton" type="button" aria-label="Close settings" title="Close settings">
              <svg class="settings-back-icon settings-back-down-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 9l6 6 6-6"></path>
              </svg>
              <svg class="settings-back-icon settings-back-left-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 12H5"></path>
                <path d="M12 5l-7 7 7 7"></path>
              </svg>
            </button>
            <h2 id="settingsSheetTitle">Settings</h2>
          </header>
          <div class="settings-views">
            <div class="settings-page" id="settingsHomePage">
              <button class="settings-nav-row" id="settingsMicrophoneNav" type="button">
                <span>
                  <strong>Microphone</strong>
                  <small>Level and amplification</small>
                </span>
                <span class="setting-value" id="micSettingsSummary">1.5x, AGC</span>
              </button>
              <button class="settings-nav-row" id="settingsAudioNav" type="button">
                <span>
                  <strong>TTS options</strong>
                  <small>Speech engine and voice</small>
                </span>
                <span class="setting-value" id="ttsOutputState">off</span>
              </button>
              <button class="settings-nav-row" id="settingsHistoryNav" type="button">
                <span>
                  <strong>History</strong>
                  <small>Saved sessions</small>
                </span>
                <span class="setting-value" id="historySettingsSummary">off</span>
              </button>
              <button class="settings-nav-row" id="settingsDevToolsNav" type="button">
                <span>
                  <strong>Dev tools</strong>
                  <small>ASR tuning and development options</small>
                </span>
              </button>
              <button class="settings-nav-row" id="installAppRow" type="button" hidden>
                <span>
                  <strong>Install app</strong>
                  <small id="installAppHint">Add to home screen</small>
                </span>
              </button>
            </div>

            <div class="settings-page" id="settingsMicrophonePage" hidden>
              <section class="setting-group" aria-label="Microphone">
                <div class="setting-title-row">
                  <span>Amplification</span>
                  <span class="setting-value" id="micPreGainValue">1.5x</span>
                </div>
                <label class="range-row" for="micPreGain">
                  <input id="micPreGain" type="range" min="0.5" max="3.0" step="0.1" value="1.5" aria-label="Amplification">
                </label>
                <div class="setting-title-row">
                  <span>Input level</span>
                </div>
                <div class="mic-level" role="meter" aria-label="Mic level" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                  <div class="mic-level-fill" id="micLevelFill"></div>
                  <div class="mic-level-threshold" aria-hidden="true"></div>
                </div>
                <label class="toggle-row" for="micAutoGainControl">
                  <input id="micAutoGainControl" type="checkbox" checked>
                  <span>Auto gain control</span>
                </label>
                <button class="link-row settings-start-button" id="settingsStartButton" type="button">Start recording</button>
                <button class="link-row audio-reset-button" id="audioSettingsReset" type="button">Reset audio</button>
              </section>
            </div>

            <div class="settings-page" id="settingsAudioPage" hidden>
              <section class="setting-group voice-output-main" aria-label="TTS options">
                <label class="toggle-row" for="ttsEnabled">
                  <input id="ttsEnabled" type="checkbox">
                  <span>Voice output</span>
                </label>
                <label class="select-row" for="ttsBackendSelect">
                  <span>Engine</span>
                  <select id="ttsBackendSelect"></select>
                </label>
              </section>
              <div class="tuning-settings-groups" id="ttsSettingsGroups"></div>
            </div>

            <div class="settings-page" id="settingsHistoryPage" hidden>
              <section class="setting-group" aria-label="History">
                <label class="toggle-row" for="historySaveSessions">
                  <input id="historySaveSessions" type="checkbox" disabled>
                  <span>Save sessions</span>
                </label>
                <label class="select-row" for="historyRetentionDays">
                  <span>Delete after</span>
                  <select id="historyRetentionDays" disabled>
                    <option value="7">7 days</option>
                  </select>
                </label>
              </section>
            </div>

            <div class="settings-page" id="settingsDevToolsPage" hidden>
              <button class="settings-nav-row" id="settingsTuningNav" type="button">
                <span>
                  <strong>ASR tuning</strong>
                  <small>Adjust live transcription behavior</small>
                </span>
              </button>
              <label class="settings-nav-row settings-toggle-row" for="devToolsShowPcExport">
                <span>
                  <strong>Show PC export button</strong>
                </span>
                <input id="devToolsShowPcExport" type="checkbox">
              </label>
            </div>
            <div class="settings-page" id="settingsTuningPage" hidden>
              <div class="tuning-settings-groups" id="tuningSettingsGroups"></div>
            </div>
          </div>
        </section>
      </div>
      <div class="sheet-layer" id="languageSheet" hidden>
        <button class="sheet-scrim" id="languageSheetScrim" type="button" aria-label="Close"></button>
        <div class="bottom-sheet">
          <div class="sheet-header">
            <button class="settings-back is-sheet-close" id="closeLanguageSheetButton" type="button" aria-label="Close" title="Close">
              <svg class="settings-back-icon settings-back-down-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 9l6 6 6-6"></path>
              </svg>
            </button>
            <h2 id="languageSheetTitle">Choose language</h2>
          </div>
          <div class="language-search-wrap">
            <input type="search" id="languageSearch" class="language-search" placeholder="Search languages…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
          </div>
          <div class="sheet-body language-sheet-body" id="languageSheetList"></div>
        </div>
      </div>

    </main>
    <script type="module" src="/src/app.js?v=20260514-voxcpm-options-5"></script>
  </body>
</html>
